<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <link rel="icon" href="/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#000000" />

  <!-- Descripción -->
  <meta name="description"
    content="Portafolio web de Santiago Burgos, desarrollador Full Stack: Node, Express, React, MySQL, PostgreSQL" />

  <!-- Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Santiago Burgos Portfolio" />
  <meta property="og:description"
    content="Portafolio web de Santiago Burgos, desarrollador Full Stack: Node, Express, React, MySQL, PostgreSQL" />
  <meta property="og:image" content="/logo192.png" />
  <meta property="og:url" content="/" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Santiago Burgos Portfolio" />
  <meta name="twitter:description"
    content="Portafolio web de Santiago Burgos, desarrollador Full Stack: Node, Express, React, MySQL, PostgreSQL" />
  <meta name="twitter:image" content="https://burgosportfolio.netlify.app/logo192.png" />

  <!-- Fuentes optimizadas -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;600;700&family=Inter:wght@400;500;600&family=Merriweather:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400;1,700;1,900&family=Poppins:wght@300;400;500;600&display=swap">

  <!-- Carga secundaria: pesos adicionales (deferred) -->
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Geist:wght@500;800&display=swap"
    onload="this.onload=null;this.rel='stylesheet'">
  <noscript>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@500;800&display=swap">
  </noscript>

  <!-- System fallback para renderizado instantáneo -->
  <style>
    body,
    a {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', 'Geist', sans-serif;
    }

    @supports (font-variation-settings: normal) {

      body,
      a {
        font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
    }
  </style>


  <link rel="apple-touch-icon" href="/logo192.png" />
  <link rel="manifest" href="/manifest.json" />

  <title>Santiago Burgos Portfolio</title>
</head>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
</body>

</html>
